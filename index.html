<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tổ Ấm 🏡</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/home.css"/>
<link rel="stylesheet" href="css/finance.css"/>
<link rel="stylesheet" href="css/chores.css"/>
<link rel="stylesheet" href="css/notes.css"/>
<link rel="stylesheet" href="css/dreams.css"/>
<!-- <link rel="stylesheet" href="css/ai.css"/> -->
<link rel="stylesheet" href="css/games.css"/>
<!-- External libs -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<div id="app">

<!-- HEADER -->
<header class="header">
  <span class="header-icon">🏡</span>
  <h1>Home Place</h1>
  <div class="header-sub">Đạt & TLinh · Ốc · Vịt · Soju · Uni · Tôm 🐱</div>
  <div class="date-chip" id="date-chip"></div>
</header>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn on" data-t="home"    onclick="go('home',this)">🏠 Tổ Ấm</button>
  <button class="nav-btn"    data-t="finance" onclick="go('finance',this)">💰 Thu Chi</button>
  <button class="nav-btn"    data-t="chores"  onclick="go('chores',this)">🧹 Việc Nhà</button>
  <button class="nav-btn"    data-t="notes"   onclick="go('notes',this)">📝 Ghi Chú</button>
  <button class="nav-btn"    data-t="dreams"  onclick="go('dreams',this)">🎯 Mục Tiêu</button>
  <!-- <button class="nav-btn"    data-t="ai"      onclick="go('ai',this)">🤖 Trợ Lý</button> -->
  <button class="nav-btn"    data-t="games"   onclick="go('games',this)">🎲 Gaming</button>
</nav>

<!-- MAIN -->
<main class="main" id="main"></main>

</div><!-- #app -->

<!-- ── MODALS ──────────────────────────────── -->

<div class="overlay" id="modal-note" onclick="if(event.target===this)closeModal('modal-note')">
  <div class="modal">
    <div class="modal-title">📝 Ghi Chú Mới</div>
    <div class="field">
      <label>Tiêu đề</label>
      <input id="n-title" placeholder="Tiêu đề..."
        onkeydown="if(event.key==='Enter'){event.preventDefault();addNote();}"/>
    </div>
    <div class="field"><label>Nội dung</label><textarea id="n-body" placeholder="Viết gì đó..."></textarea></div>
    <div class="field">
      <label>Nhãn</label>
      <div class="pills" id="n-tag-pills">
        <span class="pill on" data-v="Ghi nhớ" onclick="pickPill(this,'n-tag-pills')">📌 Ghi nhớ</span>
        <span class="pill" data-v="Cùng nhau"  onclick="pickPill(this,'n-tag-pills')">💕 Cùng nhau</span>
        <span class="pill" data-v="Mua sắm"    onclick="pickPill(this,'n-tag-pills')">🛒 Mua sắm</span>
        <span class="pill" data-v="Ý tưởng"    onclick="pickPill(this,'n-tag-pills')">💡 Ý tưởng</span>
      </div>
    </div>
    <button class="btn btn-lav btn-full" onclick="addNote()">💾 Lưu Ghi Chú</button>
  </div>
</div>

<div class="overlay" id="modal-event" onclick="if(event.target===this)closeModal('modal-event')">
  <div class="modal">
    <div class="modal-title">📅 Sự Kiện Mới</div>
    <div class="field">
      <label>Tên sự kiện</label>
      <input id="ev-name" placeholder="vd: Kỷ niệm 1 năm yêu..."
        onkeydown="if(event.key==='Enter'){event.preventDefault();addEvent();}"/>
    </div>
    <div class="row2">
      <div class="field"><label>Ngày</label><input id="ev-date" type="date"/></div>
      <div class="field">
        <label>Loại</label>
        <div class="pills" id="ev-type-pills" style="margin-top:.2rem">
          <span class="pill on-lav on" data-v="chung" onclick="pickPill(this,'ev-type-pills')">💑 Chung</span>
          <span class="pill"          data-v="rieng"  onclick="pickPill(this,'ev-type-pills')">👤 Cá nhân</span>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Ai</label>
      <select id="ev-who">
        <option>Cả hai</option><option>Đạt</option><option>TLinh</option>
      </select>
    </div>
    <button class="btn btn-lav btn-full" onclick="addEvent()">📅 Lưu Sự Kiện</button>
  </div>
</div>

<div class="overlay" id="modal-dream" onclick="if(event.target===this)closeModal('modal-dream')">
  <div class="modal">
    <div class="modal-title">🎯 Mục Tiêu Mới</div>
    <div class="field">
      <label>Tên mục tiêu</label>
      <input id="dr-title" placeholder="vd: Du lịch Đà Lạt, mua xe mới..."
        onkeydown="if(event.key==='Enter'){event.preventDefault();addDream();}"/>
    </div>
    <div class="field">
      <label>Ghi chú</label>
      <textarea id="dr-note" placeholder="Mô tả thêm..." style="min-height:56px"></textarea>
    </div>
    <div class="field">
      <label>Danh mục</label>
      <div class="pills" id="dr-cat-pills">
        <span class="pill on" data-v="travel" onclick="pickPill(this,'dr-cat-pills')">✈️ Du lịch</span>
        <span class="pill"    data-v="home"   onclick="pickPill(this,'dr-cat-pills')">🏠 Tổ ấm</span>
        <span class="pill"    data-v="life"   onclick="pickPill(this,'dr-cat-pills')">💑 Cuộc sống</span>
        <span class="pill"    data-v="money"  onclick="pickPill(this,'dr-cat-pills')">💰 Tài chính</span>
      </div>
    </div>
    <div class="field">
      <label>Tiến độ — <span id="dr-prog-val">0</span>%</label>
      <input type="range" id="dr-progress" min="0" max="100" value="0"
        oninput="document.getElementById('dr-prog-val').textContent=this.value;updateRangeStyle(this)"/>
    </div>
    <button class="btn btn-peach btn-full" onclick="addDream()">🎯 Thêm Mục Tiêu</button>
  </div>
</div>

<!-- ── SCRIPTS ─────────────────────────────── -->
<script src="js/core.js"></script>
<script src="js/home.js"></script>
<script src="js/finance.js"></script>
<script src="js/chores.js"></script>
<script src="js/notes.js"></script>
<script src="js/dreams.js"></script>
<!-- <script src="js/ai.js"></script> -->
<script src="js/games.js"></script>
<script src="js/realtime.js"></script>

</body>
</html>
